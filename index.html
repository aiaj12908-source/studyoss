<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"/>
<meta name="theme-color" content="#6366f1"/>

<!-- PWA / iPhone -->

<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="StudyOS"/>
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png"/>
<link rel="manifest" href="manifest.json"/>

<!-- SEO -->

<meta name="description" content="Daily study tracker for Punjab Police Constable exam – StudyOS"/>
<title>StudyOS · Punjab Police</title>

<!-- Favicon -->

<link rel="icon" href="favicon.ico"/>

<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=JetBrains+Mono:wght@300;400;500;600&display=swap" rel="stylesheet"/>

<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --bg:#0c0f1a; --surface:#111520; --surface2:#161b2e; --surface3:#1c2238;
  --border:rgba(255,255,255,0.06); --border2:rgba(255,255,255,0.1);
  --text:#f0f4ff; --text2:#8892b0; --text3:#4a5568;
  --gold:#e8b84b; --teal:#2dd4bf; --indigo:#6366f1;
  --rose:#f43f5e; --amber:#fb923c; --emerald:#34d399;
  --sky:#38bdf8; --violet:#a78bfa; --r:12px; --r2:8px;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bot: env(safe-area-inset-bottom, 0px);
}
html,body{height:100%;overflow:hidden;overscroll-behavior:none;}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;display:flex;flex-direction:column;position:relative;}
body::before{content:'';position:fixed;top:-200px;right:-200px;width:500px;height:500px;border-radius:50%;background:radial-gradient(circle,rgba(99,102,241,0.07) 0%,transparent 70%);pointer-events:none;z-index:0;}
body::after{content:'';position:fixed;bottom:-150px;left:-150px;width:400px;height:400px;border-radius:50%;background:radial-gradient(circle,rgba(45,212,191,0.05) 0%,transparent 70%);pointer-events:none;z-index:0;}

/* ── HEADER ── */
.header{
  position:relative;z-index:10;
  background:linear-gradient(180deg,rgba(17,21,32,0.98),rgba(12,15,26,0.95));
  backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
  border-bottom:1px solid var(--border);
  padding:calc(var(--safe-top) + 14px) 18px 13px;
  flex-shrink:0;
}
.header-row1{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;}
.brand{display:flex;align-items:center;gap:10px;}
.brand-icon{width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,var(--indigo),var(--teal));display:flex;align-items:center;justify-content:center;font-size:16px;box-shadow:0 4px 14px rgba(99,102,241,0.35);flex-shrink:0;}
.brand-name{font-size:16px;font-weight:800;letter-spacing:-0.3px;}
.brand-sub{font-size:8px;color:var(--text3);letter-spacing:2px;text-transform:uppercase;margin-top:1px;}
.header-right{display:flex;gap:8px;align-items:center;}
.stat-pill{display:flex;align-items:center;gap:5px;padding:5px 10px;border-radius:20px;background:var(--surface2);border:1px solid var(--border);font-size:10px;font-family:'JetBrains Mono',monospace;}
.stat-pill .val{color:var(--gold);font-weight:600;}
.stat-pill .lbl{color:var(--text3);}
.arc-wrap{position:relative;width:50px;height:50px;flex-shrink:0;}
.arc-wrap svg{transform:rotate(-90deg);}
.arc-bg{fill:none;stroke:rgba(255,255,255,0.06);stroke-width:3;}
.arc-fill{fill:none;stroke-width:3;stroke-linecap:round;transition:stroke-dashoffset 0.6s cubic-bezier(0.4,0,0.2,1);}
.arc-text{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;}
.arc-pct{font-size:11px;font-weight:700;color:var(--gold);font-family:'JetBrains Mono',monospace;}
.header-row2{display:flex;align-items:center;gap:10px;}
.prog-track{flex:1;height:3px;background:rgba(255,255,255,0.05);border-radius:2px;overflow:hidden;}
.prog-fill{height:100%;border-radius:2px;transition:width 0.6s cubic-bezier(0.4,0,0.2,1);}
.prog-nums{font-size:9px;color:var(--text3);font-family:'JetBrains Mono',monospace;white-space:nowrap;}
.motive{margin-top:9px;display:inline-flex;align-items:center;padding:5px 10px;border-radius:6px;background:rgba(99,102,241,0.08);border:1px solid rgba(99,102,241,0.15);font-size:10px;color:var(--violet);font-style:italic;}

/* ── TABS ── */
.tabs{position:relative;z-index:10;display:flex;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0;}
.tab{flex:1;padding:12px 4px;background:none;border:none;border-bottom:2px solid transparent;color:var(--text3);cursor:pointer;font-size:9px;letter-spacing:3px;text-transform:uppercase;font-family:'Syne',sans-serif;font-weight:600;transition:all 0.25s;}
.tab.active{color:var(--teal);border-bottom-color:var(--teal);}

/* ── SCROLLER ── */
.scroller{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;position:relative;z-index:5;overscroll-behavior:contain;}
.scroller::-webkit-scrollbar{display:none;}
.panel{padding:14px 16px;max-width:640px;margin:0 auto;padding-bottom:calc(var(--safe-bot) + 90px);}

/* ── DATE CHIP ── */
.date-chip{display:inline-flex;align-items:center;gap:6px;padding:5px 10px;border-radius:6px;background:var(--surface2);border:1px solid var(--border);font-size:9px;color:var(--text3);font-family:'JetBrains Mono',monospace;margin-bottom:14px;}

/* ── BLOCKS ── */
.block{margin-bottom:10px;border-radius:var(--r);overflow:hidden;border:1px solid var(--border);background:var(--surface);transition:all 0.3s;animation:fadeUp 0.4s ease both;}
.block.now{border-color:rgba(99,102,241,0.35);box-shadow:0 0 0 1px rgba(99,102,241,0.1),0 6px 28px rgba(0,0,0,0.5);}
.block.custom-block{border-style:dashed;}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
.block-head{display:flex;justify-content:space-between;align-items:center;padding:11px 13px;border-bottom:1px solid var(--border);}
.block-head-left{display:flex;align-items:center;gap:10px;flex:1;min-width:0;}
.block-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.block-title{font-size:12px;font-weight:700;display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
.now-tag{font-size:7px;font-weight:700;letter-spacing:2px;text-transform:uppercase;padding:2px 6px;border-radius:4px;background:var(--indigo);color:#fff;animation:blink 2s infinite;}
.custom-tag{font-size:7px;letter-spacing:1px;text-transform:uppercase;padding:2px 6px;border-radius:4px;background:rgba(255,255,255,0.07);color:var(--text3);}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:0.5;}}
.block-time{font-size:9px;color:var(--text3);margin-top:2px;font-family:'JetBrains Mono',monospace;}
.block-head-right{display:flex;align-items:center;gap:7px;flex-shrink:0;}
.bprog-txt{font-size:10px;font-family:'JetBrains Mono',monospace;}
.bprog-bar{width:36px;height:3px;background:rgba(255,255,255,0.08);border-radius:2px;overflow:hidden;}
.bprog-fill{height:100%;border-radius:2px;transition:width 0.4s;}
.icon-btn{width:26px;height:26px;border-radius:6px;border:1px solid rgba(255,255,255,0.08);background:none;cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;transition:all 0.2s;flex-shrink:0;}
.icon-btn:active{background:rgba(244,63,94,0.2);transform:scale(0.92);}

/* ── SUBJECTS ── */
.subjects{padding:9px;display:grid;gap:6px;}
.subj{display:flex;align-items:center;gap:9px;padding:11px 12px;border-radius:var(--r2);cursor:pointer;border:1px solid var(--border);background:rgba(255,255,255,0.02);transition:all 0.2s;-webkit-user-select:none;user-select:none;}
.subj:active{transform:scale(0.98);}
.subj-emoji{font-size:18px;flex-shrink:0;line-height:1;}
.subj-text{flex:1;min-width:0;}
.subj-name{font-size:11px;font-weight:700;display:block;}
.subj-tag{font-size:8px;letter-spacing:1.5px;text-transform:uppercase;margin-top:2px;display:block;font-family:'JetBrains Mono',monospace;}
.subj-check{width:22px;height:22px;border-radius:6px;flex-shrink:0;border:1.5px solid rgba(255,255,255,0.12);display:flex;align-items:center;justify-content:center;transition:all 0.2s;font-size:12px;}
.subj-del{background:none;border:none;color:var(--text3);cursor:pointer;font-size:16px;padding:4px;flex-shrink:0;line-height:1;}

/* ── ADD SUBJECT ── */
.add-row{padding:0 9px 9px;display:flex;gap:6px;}
.add-inp{flex:1;background:rgba(255,255,255,0.02);border:1px dashed rgba(255,255,255,0.09);border-radius:var(--r2);padding:9px 11px;color:var(--text2);font-size:11px;font-family:'Syne',sans-serif;outline:none;}
.add-inp::placeholder{color:var(--text3);}
.add-btn{padding:9px 13px;border-radius:var(--r2);border:none;background:rgba(99,102,241,0.18);color:var(--indigo);cursor:pointer;font-size:11px;font-family:'Syne',sans-serif;font-weight:700;white-space:nowrap;}
.add-btn:active{background:rgba(99,102,241,0.3);}

/* ── ADD SLOT BTN ── */
.add-slot-btn{width:100%;margin-top:6px;padding:14px;border-radius:var(--r);border:1.5px dashed rgba(99,102,241,0.25);background:rgba(99,102,241,0.04);color:var(--indigo);cursor:pointer;font-size:12px;font-weight:700;font-family:'Syne',sans-serif;letter-spacing:1px;display:flex;align-items:center;justify-content:center;gap:8px;transition:all 0.2s;}
.add-slot-btn:active{background:rgba(99,102,241,0.1);}

/* ── COMPLETE ── */
.complete{margin-top:10px;padding:24px 18px;border-radius:var(--r);background:linear-gradient(135deg,rgba(52,211,153,0.12),rgba(45,212,191,0.06));border:1px solid rgba(52,211,153,0.22);text-align:center;animation:fadeUp 0.4s ease both;}
.complete-icon{font-size:32px;margin-bottom:8px;}
.complete-title{font-size:14px;font-weight:800;color:var(--emerald);letter-spacing:1px;}
.complete-sub{font-size:10px;color:var(--text3);margin-top:6px;line-height:1.6;}

/* ── WEEK ── */
.week-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;}
.week-title{font-size:11px;font-weight:700;letter-spacing:1px;color:var(--text2);}
.week-stat{font-size:9px;color:var(--text3);font-family:'JetBrains Mono',monospace;}
.day-cols{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;margin-bottom:22px;}
.day-col{text-align:center;}
.day-name{font-size:8px;font-weight:600;letter-spacing:1px;margin-bottom:5px;}
.day-bar-bg{height:68px;border-radius:6px;overflow:hidden;background:rgba(255,255,255,0.03);border:1px solid var(--border);display:flex;align-items:flex-end;}
.day-bar-fill{width:100%;transition:height 0.5s cubic-bezier(0.4,0,0.2,1);}
.day-pct{font-size:7px;color:var(--text3);margin-top:3px;font-family:'JetBrains Mono',monospace;}
.wgs{margin-bottom:18px;}
.wgs-title{font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;padding:7px 0;margin-bottom:7px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;}
.wgs-row{display:flex;align-items:center;gap:6px;margin-bottom:5px;}
.wgs-icon{font-size:12px;width:16px;text-align:center;flex-shrink:0;}
.wgs-name{font-size:9px;color:var(--text2);width:108px;flex-shrink:0;}
.wgs-cells{display:flex;gap:3px;flex:1;}
.wgs-cell{flex:1;height:17px;border-radius:3px;background:rgba(255,255,255,0.04);}
.wgs-n{font-size:8px;width:22px;text-align:right;flex-shrink:0;font-family:'JetBrains Mono',monospace;}

/* ── NOTES ── */
.notes-label{font-size:9px;color:var(--text3);letter-spacing:2px;text-transform:uppercase;margin-bottom:12px;font-family:'JetBrains Mono',monospace;}
.notes-row{display:flex;gap:7px;margin-bottom:13px;}
.notes-inp{flex:1;background:var(--surface2);border:1px solid var(--border2);border-radius:var(--r2);padding:11px 13px;color:var(--text);font-size:12px;font-family:'Syne',sans-serif;outline:none;}
.notes-inp::placeholder{color:var(--text3);}
.notes-add{width:42px;border-radius:var(--r2);border:none;background:linear-gradient(135deg,var(--indigo),var(--teal));color:#fff;cursor:pointer;font-size:22px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.note-card{padding:11px 13px;margin-bottom:6px;background:var(--surface2);border:1px solid var(--border);border-left:3px solid var(--indigo);border-radius:0 var(--r2) var(--r2) 0;display:flex;justify-content:space-between;align-items:flex-start;gap:10px;animation:fadeUp 0.3s ease both;}
.note-text{font-size:11px;color:var(--text2);line-height:1.6;flex:1;}
.note-del{background:none;border:none;color:var(--text3);cursor:pointer;font-size:18px;line-height:1;padding:2px;}
.notes-empty{text-align:center;padding:44px 20px;color:var(--text3);font-size:11px;}
.empty-icon{font-size:30px;margin-bottom:10px;opacity:0.35;}

/* ── BOTTOM NAV ── */
.bnav{
  position:fixed;bottom:0;left:0;right:0;
  background:rgba(13,16,28,0.97);
  backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
  border-top:1px solid var(--border);
  display:flex;
  padding:8px 0 calc(var(--safe-bot) + 6px);
  z-index:100;
}
.bnav-btn{flex:1;background:none;border:none;display:flex;flex-direction:column;align-items:center;gap:4px;color:var(--text3);cursor:pointer;padding:4px 0;transition:color 0.2s;font-family:'Syne',sans-serif;}
.bnav-btn.active{color:var(--teal);}
.bnav-icon{font-size:20px;line-height:1;}
.bnav-lbl{font-size:8px;letter-spacing:1.5px;text-transform:uppercase;font-weight:600;}

/* ── MODAL ── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.78);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);z-index:300;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity 0.25s;}
.overlay.open{opacity:1;pointer-events:all;}
.modal{width:100%;max-width:500px;background:var(--surface2);border:1px solid var(--border2);border-radius:22px 22px 0 0;padding:16px 18px calc(var(--safe-bot) + 36px);transform:translateY(100%);transition:transform 0.32s cubic-bezier(0.4,0,0.2,1);max-height:90vh;overflow-y:auto;}
.overlay.open .modal{transform:translateY(0);}
.modal-handle{width:36px;height:4px;border-radius:2px;background:rgba(255,255,255,0.18);margin:0 auto 16px;}
.modal-title{font-size:15px;font-weight:800;margin-bottom:16px;}
.mlabel{font-size:8px;letter-spacing:2px;text-transform:uppercase;color:var(--text3);margin-bottom:5px;margin-top:14px;display:block;font-family:'JetBrains Mono',monospace;}
.minput{width:100%;background:var(--surface3);border:1px solid var(--border2);border-radius:var(--r2);padding:11px 13px;color:var(--text);font-size:13px;font-family:'Syne',sans-serif;outline:none;}
.minput::placeholder{color:var(--text3);}
.time-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.color-grid{display:flex;gap:8px;flex-wrap:wrap;margin-top:6px;}
.cswatch{width:28px;height:28px;border-radius:8px;cursor:pointer;border:2px solid transparent;transition:all 0.15s;flex-shrink:0;}
.cswatch.sel{border-color:#fff;transform:scale(1.2);}
.emoji-grid{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px;}
.epick{width:34px;height:34px;border-radius:8px;cursor:pointer;border:1px solid var(--border);background:var(--surface3);font-size:16px;display:flex;align-items:center;justify-content:center;transition:all 0.15s;}
.epick.sel{border-color:var(--indigo);background:rgba(99,102,241,0.2);}
.mactions{display:flex;gap:8px;margin-top:20px;}
.mcancel{flex:1;padding:13px;border-radius:var(--r2);border:1px solid var(--border2);background:none;color:var(--text2);cursor:pointer;font-family:'Syne',sans-serif;font-size:13px;font-weight:600;}
.msave{flex:2;padding:13px;border-radius:var(--r2);border:none;background:linear-gradient(135deg,var(--indigo),var(--teal));color:#fff;cursor:pointer;font-family:'Syne',sans-serif;font-size:13px;font-weight:800;letter-spacing:0.5px;box-shadow:0 4px 14px rgba(99,102,241,0.35);}
.msave:active{transform:scale(0.97);}

/* ── SYLLABUS ── */
.syl-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;}
.syl-folder{border-radius:var(--r);border:1px solid var(--border);background:var(--surface);padding:14px 13px;cursor:pointer;transition:all 0.2s;position:relative;overflow:hidden;}
.syl-folder::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;}
.syl-folder:active{transform:scale(0.97);}
.syl-folder-top{display:flex;justify-content:space-between;align-items:flex-start;}
.syl-folder-icon{font-size:24px;margin-bottom:6px;}
.syl-folder-name{font-size:12px;font-weight:800;margin-bottom:4px;}
.syl-folder-count{font-size:9px;color:var(--text3);font-family:'JetBrains Mono',monospace;}
.syl-folder-del{background:none;border:none;color:var(--text3);cursor:pointer;font-size:16px;padding:2px;line-height:1;}
.syl-prog-bar{height:3px;background:rgba(255,255,255,0.06);border-radius:2px;overflow:hidden;margin-top:8px;}
.syl-prog-fill{height:100%;border-radius:2px;transition:width 0.4s;}
.syl-add-btn{width:100%;padding:14px;border-radius:var(--r);border:1.5px dashed rgba(99,102,241,0.3);background:rgba(99,102,241,0.04);color:var(--indigo);cursor:pointer;font-size:12px;font-weight:700;font-family:'Syne',sans-serif;display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:14px;}
/* Subject detail view */
.syl-back{display:flex;align-items:center;gap:8px;padding:0 0 14px;cursor:pointer;color:var(--text2);font-size:12px;font-weight:700;}
.syl-back-icon{font-size:18px;}
.syl-subject-hdr{display:flex;align-items:center;gap:10px;padding:13px;border-radius:var(--r);margin-bottom:12px;}
.syl-subject-title{font-size:15px;font-weight:800;}
.syl-subject-sub{font-size:9px;color:rgba(255,255,255,0.5);margin-top:2px;font-family:'JetBrains Mono',monospace;}
.syl-chapter{display:flex;align-items:flex-start;gap:10px;padding:11px 12px;border-radius:var(--r2);border:1px solid var(--border);background:var(--surface);margin-bottom:7px;transition:all 0.2s;}
.syl-chapter.done{background:rgba(52,211,153,0.05);border-color:rgba(52,211,153,0.2);}
.syl-check{width:22px;height:22px;border-radius:6px;border:1.5px solid rgba(255,255,255,0.15);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;margin-top:1px;transition:all 0.2s;}
.syl-check.checked{background:var(--emerald);border-color:var(--emerald);}
.syl-chapter-body{flex:1;min-width:0;}
.syl-chapter-name{font-size:11px;font-weight:700;color:var(--text);}
.syl-chapter.done .syl-chapter-name{color:var(--emerald);text-decoration:line-through;text-decoration-color:rgba(52,211,153,0.4);}
.syl-chapter-note{font-size:10px;color:var(--text3);margin-top:4px;font-style:italic;}
.syl-note-inp{width:100%;margin-top:6px;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.08);border-radius:6px;padding:7px 9px;color:var(--text2);font-size:10px;font-family:'Syne',sans-serif;outline:none;display:none;}
.syl-chapter-actions{display:flex;gap:6px;flex-shrink:0;}
.syl-note-btn{background:none;border:1px solid var(--border);border-radius:5px;color:var(--text3);cursor:pointer;font-size:11px;padding:4px 7px;}
.syl-del-btn{background:none;border:none;color:var(--text3);cursor:pointer;font-size:16px;padding:2px;line-height:1;}
.syl-add-ch{display:flex;gap:6px;margin-top:10px;}
.syl-add-ch input{flex:1;background:rgba(255,255,255,0.03);border:1px dashed rgba(255,255,255,0.1);border-radius:var(--r2);padding:10px 12px;color:var(--text2);font-size:11px;font-family:'Syne',sans-serif;outline:none;}
.syl-add-ch button{padding:10px 14px;border-radius:var(--r2);border:none;background:rgba(99,102,241,0.2);color:var(--indigo);cursor:pointer;font-size:11px;font-weight:700;font-family:'Syne',sans-serif;}
/* Add subject modal */
.syl-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.75);backdrop-filter:blur(10px);z-index:400;align-items:flex-end;justify-content:center;}
.syl-modal.open{display:flex;}
.syl-modal-box{width:100%;max-width:500px;background:var(--surface2);border-radius:22px 22px 0 0;border:1px solid var(--border2);padding:18px 18px calc(var(--safe-bot)+30px);max-height:80vh;overflow-y:auto;}

/* ── INSTALL BANNER (Safari hint) ── */
.install-hint{
  position:fixed;bottom:calc(var(--safe-bot) + 70px);left:16px;right:16px;
  background:linear-gradient(135deg,#1a1040,#0d1a2e);
  border:1px solid rgba(99,102,241,0.35);border-radius:14px;
  padding:13px 15px;display:none;
  box-shadow:0 8px 32px rgba(0,0,0,0.5);z-index:200;
  animation:fadeUp 0.4s ease;
}
.install-hint.show{display:flex;align-items:center;gap:12px;}
.install-hint-txt{flex:1;}
.install-hint-txt strong{font-size:12px;color:#a78bfa;display:block;margin-bottom:2px;}
.install-hint-txt span{font-size:10px;color:var(--text3);}
.install-close{background:none;border:none;color:var(--text3);cursor:pointer;font-size:20px;padding:4px;}
</style>

</head>
<body>

<!-- HEADER -->

<div class="header">
  <div class="header-row1">
    <div class="brand">
      <div class="brand-icon">📋</div>
      <div>
        <div class="brand-name">StudyOS</div>
        <div class="brand-sub">Punjab Police Constable</div>
      </div>
    </div>
    <div class="header-right">
      <div class="stat-pill"><span class="val" id="streakVal">0</span><span class="lbl">🔥</span></div>
      <div class="arc-wrap">
        <svg width="50" height="50" viewBox="0 0 50 50">
          <circle class="arc-bg" cx="25" cy="25" r="21"/>
          <circle class="arc-fill" id="arcFill" cx="25" cy="25" r="21"
            stroke="url(#ag)" stroke-dasharray="131.9" stroke-dashoffset="131.9"/>
          <defs><linearGradient id="ag" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#6366f1"/>
            <stop offset="100%" stop-color="#2dd4bf"/>
          </linearGradient></defs>
        </svg>
        <div class="arc-text"><div class="arc-pct" id="arcPct">0%</div></div>
      </div>
    </div>
  </div>
  <div class="header-row2">
    <div class="prog-track"><div class="prog-fill" id="progFill" style="width:0%"></div></div>
    <div class="prog-nums" id="progNums">0/0</div>
  </div>
  <div class="motive" id="motiveEl">...</div>
</div>

<!-- TABS -->

<div class="tabs">
  <button class="tab active" onclick="switchTab('today')">Today</button>
  <button class="tab" onclick="switchTab('week')">Week</button>
  <button class="tab" onclick="switchTab('syllabus')">Syllabus</button>
  <button class="tab" onclick="switchTab('stats')">Stats</button>
  <button class="tab" onclick="switchTab('notes')">Notes</button>
</div>

<!-- CONTENT -->

<div class="scroller">
  <div class="panel" id="tab-today"></div>
  <div class="panel" id="tab-week" style="display:none"></div>
  <div class="panel" id="tab-syllabus" style="display:none"></div>
  <div class="panel" id="tab-stats" style="display:none"></div>
  <div class="panel" id="tab-notes" style="display:none"></div>
</div>

<!-- BOTTOM NAV -->

<div class="bnav">
  <button class="bnav-btn active" onclick="switchTab('today')" id="bn-today">
    <span class="bnav-icon">📋</span><span class="bnav-lbl">Today</span>
  </button>
  <button class="bnav-btn" onclick="switchTab('week')" id="bn-week">
    <span class="bnav-icon">📊</span><span class="bnav-lbl">Week</span>
  </button>
  <button class="bnav-btn" onclick="switchTab('syllabus')" id="bn-syllabus">
    <span class="bnav-icon">📚</span><span class="bnav-lbl">Syllabus</span>
  </button>
  <button class="bnav-btn" onclick="switchTab('stats')" id="bn-stats">
    <span class="bnav-icon">📈</span><span class="bnav-lbl">Stats</span>
  </button>
  <button class="bnav-btn" onclick="switchTab('notes')" id="bn-notes">
    <span class="bnav-icon">📝</span><span class="bnav-lbl">Notes</span>
  </button>
</div>

<!-- ADD SLOT MODAL -->

<div class="overlay" id="overlay" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">＋ Add Custom Slot</div>
    <span class="mlabel">Slot Name *</span>
    <input class="minput" id="mName" placeholder="e.g. Evening Reading, Mock Test…"/>
    <span class="mlabel">Time</span>
    <div class="time-row">
      <input class="minput" id="mFrom" placeholder="From  5:00 PM"/>
      <input class="minput" id="mTo"   placeholder="To  6:00 PM"/>
    </div>
    <span class="mlabel">Color</span>
    <div class="color-grid" id="colorGrid"></div>
    <span class="mlabel">First Subject (optional)</span>
    <div style="display:flex;gap:8px;align-items:center;margin-top:4px;">
      <button onclick="toggleEmoji()" id="emojiBtn" style="width:42px;height:42px;border-radius:var(--r2);border:1px solid var(--border2);background:var(--surface3);font-size:20px;cursor:pointer;flex-shrink:0;">📌</button>
      <input class="minput" id="mSubj" placeholder="Subject / task name…"/>
    </div>
    <div class="emoji-grid" id="emojiGrid" style="display:none;"></div>
    <div class="mactions">
      <button class="mcancel" onclick="closeModal()">Cancel</button>
      <button class="msave" onclick="saveSlot()">Save Slot →</button>
    </div>
  </div>
</div>

<!-- iOS INSTALL HINT -->

<div class="install-hint" id="installHint">
  <div style="font-size:22px">📲</div>
  <div class="install-hint-txt">
    <strong>Install on iPhone</strong>
    <span>Tap Share → "Add to Home Screen"</span>
  </div>
  <button class="install-close" onclick="document.getElementById('installHint').style.display='none'">×</button>
</div>

<!-- SYLLABUS: ADD SUBJECT MODAL -->

<div class="syl-modal" id="sylModal" onclick="if(event.target===this)closeSylModal()">
  <div class="syl-modal-box">
    <div class="modal-handle"></div>
    <div class="modal-title">＋ Add Subject</div>
    <span class="mlabel">Subject Name *</span>
    <input class="minput" id="sylName" placeholder="e.g. English, History…"/>
    <span class="mlabel">Icon (emoji)</span>
    <div style="display:flex;gap:8px;align-items:center;margin-top:6px;">
      <button onclick="toggleSylEmoji()" id="sylEmojiBtn" style="width:42px;height:42px;border-radius:var(--r2);border:1px solid var(--border2);background:var(--surface3);font-size:20px;cursor:pointer;">📖</button>
      <span style="font-size:10px;color:var(--text3)">Tap to pick emoji</span>
    </div>
    <div class="emoji-grid" id="sylEmojiGrid" style="display:none;margin-top:8px;"></div>
    <span class="mlabel">Color</span>
    <div class="color-grid" id="sylColorGrid" style="margin-top:6px;"></div>
    <div class="mactions">
      <button class="mcancel" onclick="closeSylModal()">Cancel</button>
      <button class="msave" onclick="saveNewSubject()">Add Subject →</button>
    </div>
  </div>
</div>

<script>
// ── DATA ──────────────────────────────────────────────
const FIXED=[
  {id:"b1",time:"9:00 AM – 1:00 PM",label:"Morning Block",color:"#e8b84b",
   subjects:[{id:"punjab_gk",name:"Punjab GK",icon:"🌾"},{id:"polity",name:"Polity",icon:"⚖️"},{id:"vocabulary",name:"Vocabulary",icon:"🔤"},{id:"static_gk",name:"Static GK",icon:"📚"},{id:"ca",name:"Current Affairs",icon:"📰"}]},
  {id:"b2",time:"1:00 PM – 2:00 PM",label:"Punjabi",color:"#f43f5e",subjects:[{id:"punjabi",name:"Punjabi",icon:"✍️"}]},
  {id:"b3",time:"2:00 PM – 3:00 PM",label:"Math",color:"#fb923c",subjects:[{id:"math_d",name:"Math",icon:"🔢"}]},
  {id:"b4",time:"3:00 PM – 4:00 PM",label:"Reasoning",color:"#38bdf8",subjects:[{id:"rsn_d",name:"Reasoning",icon:"🧩"}]},
  {id:"b5",time:"4:00 PM – 5:00 PM",label:"Computer",color:"#4ade80",subjects:[{id:"cmp_d",name:"Computer",icon:"💻"}]},
  {id:"b6",time:"7:00 PM – 12:00 AM",label:"Night Revision",color:"#a78bfa",
   subjects:[{id:"math_n",name:"Math Revision",icon:"🔢"},{id:"rsn_n",name:"Reasoning Revision",icon:"🧩"},{id:"cmp_n",name:"Computer Revision",icon:"💻"},{id:"day_rev",name:"Day Revision",icon:"📖"}]},
];
const PALETTE=["#6366f1","#2dd4bf","#f43f5e","#fb923c","#e8b84b","#4ade80","#38bdf8","#a78bfa","#ec4899","#f97316","#34d399","#818cf8"];
const EMOJIS=["📌","⭐","🔖","💡","🎯","📝","🏃","☕","🌙","🌅","🔔","💪","📖","🧠","✏️","⏰","🔥","🎓","🏆","🧪","📐","🗺️","🔑","💰"];
const DAYS=["Mon","Tue","Wed","Thu","Fri","Sat","Sun"];

// ── SYLLABUS DEFAULT DATA ──────────────────────────────
const SYLLABUS_DEFAULT=[
  {id:"syl_pgk",name:"Punjab GK",icon:"🌾",color:"#f97316",chapters:[
    {id:"pgk_g1",name:"Guru Nanak Dev Ji (1st Guru)"},{id:"pgk_g2",name:"Guru Angad Dev Ji (2nd)"},
    {id:"pgk_g3",name:"Guru Amar Das Ji (3rd)"},{id:"pgk_g4",name:"Guru Ram Das Ji (4th)"},
    {id:"pgk_g5",name:"Guru Arjan Dev Ji (5th)"},{id:"pgk_g6",name:"Guru Hargobind Ji (6th)"},
    {id:"pgk_g7",name:"Guru Har Rai Ji (7th)"},{id:"pgk_g8",name:"Guru Har Krishan Ji (8th)"},
    {id:"pgk_g9",name:"Guru Tegh Bahadur Ji (9th)"},{id:"pgk_g10",name:"Guru Gobind Singh Ji (10th)"},
    {id:"pgk_banda",name:"Banda Singh Bahadur"},{id:"pgk_misls",name:"Sikh Misls Period"},
    {id:"pgk_mhr",name:"Maharaja Ranjit Singh"},{id:"pgk_anglo1",name:"Anglo-Sikh War 1st (1845-46)"},
    {id:"pgk_anglo2",name:"Anglo-Sikh War 2nd (1848-49)"},{id:"pgk_british",name:"Punjab Under British Rule"},
    {id:"pgk_movement",name:"Freedom Movement in Punjab"},{id:"pgk_geo",name:"Geography of Punjab"},
    {id:"pgk_partition",name:"Partition of Punjab 1947"},
  ]},
  {id:"syl_polity",name:"Polity",icon:"⚖️",color:"#6366f1",chapters:[
    {id:"pol_ca",name:"Constituent Assembly"},{id:"pol_making",name:"Making of Constitution"},
    {id:"pol_p1",name:"Part I – Union & Territory (Art 1-4)"},{id:"pol_p2",name:"Part II – Citizenship (Art 5-11)"},
    {id:"pol_p3",name:"Part III – Fundamental Rights (Art 12-35)"},{id:"pol_p4",name:"Part IV – DPSP (Art 36-51)"},
    {id:"pol_p4a",name:"Part IVA – Fundamental Duties (Art 51A)"},{id:"pol_p5",name:"Part V – Union Govt (Art 52-151)"},
    {id:"pol_p6",name:"Part VI – State Govt (Art 152-237)"},{id:"pol_p8",name:"Part VIII – UTs (Art 239-242)"},
    {id:"pol_p9",name:"Part IX – Panchayats (Art 243A-243O)"},{id:"pol_p9a",name:"Part IXA – Municipalities"},
    {id:"pol_p10",name:"Part X – Scheduled Areas (Art 244)"},{id:"pol_p11",name:"Part XI – Union-State Relations"},
    {id:"pol_p12",name:"Part XII – Finance (Art 264-300A)"},{id:"pol_p15",name:"Part XV – Elections (Art 324-329)"},
    {id:"pol_p18",name:"Part XVIII – Emergency (Art 352-360)"},{id:"pol_p20",name:"Part XX – Amendment (Art 368)"},
    {id:"pol_sch",name:"All 12 Schedules"},{id:"pol_amend",name:"Important Amendments"},
    {id:"pol_acts",name:"Important Constitutional Acts"},
  ]},
  {id:"syl_math",name:"Math",icon:"🔢",color:"#fb923c",chapters:[
    {id:"m_simplify",name:"Simplification"},{id:"m_decimal",name:"Decimal & Fraction"},
    {id:"m_avg",name:"Average"},{id:"m_calc",name:"Basic Calculation Tricks"},
    {id:"m_pct",name:"Percentage"},{id:"m_pl",name:"Profit & Loss"},
    {id:"m_disc",name:"Discount"},{id:"m_ratio",name:"Ratio & Proportion"},
    {id:"m_partner",name:"Partnership"},{id:"m_si",name:"Simple Interest"},
    {id:"m_ci",name:"Compound Interest"},{id:"m_tw",name:"Time & Work"},
    {id:"m_pipe",name:"Pipe & Cistern"},{id:"m_mixture",name:"Mixture & Alligation"},
    {id:"m_speed",name:"Speed Time & Distance"},{id:"m_train",name:"Problems on Trains"},
    {id:"m_boat",name:"Boat & Stream"},{id:"m_area",name:"Area & Perimeter"},
    {id:"m_vol",name:"Volume & Surface Area"},{id:"m_num",name:"Number System"},
    {id:"m_hcf",name:"HCF & LCM"},{id:"m_age",name:"Problems on Ages"},
  ]},
  {id:"syl_reasoning",name:"Reasoning",icon:"🧩",color:"#38bdf8",chapters:[
    {id:"r_nonverbal",name:"Non Verbal Reasoning"},{id:"r_seating",name:"Seating Arrangement"},
    {id:"r_puzzle",name:"Puzzle"},{id:"r_mixtest",name:"Mix Test Reasoning"},
    {id:"r_blood",name:"Blood Relation"},{id:"r_dir",name:"Direction & Distance"},
    {id:"r_syllogism",name:"Syllogism"},{id:"r_rank",name:"Ranking & Order"},
    {id:"r_series",name:"Series"},{id:"r_analogy",name:"Analogy"},
    {id:"r_coding",name:"Coding-Decoding"},{id:"r_alpha",name:"Alphanumeric Series"},
    {id:"r_statement",name:"Statement & Conclusion"},{id:"r_inequality",name:"Inequality"},
  ]},
  {id:"syl_computer",name:"Computer",icon:"💻",color:"#4ade80",chapters:[]},
  {id:"syl_punjabi",name:"Punjabi",icon:"✍️",color:"#f43f5e",chapters:[]},
  {id:"syl_english",name:"English",icon:"🔤",color:"#2dd4bf",chapters:[]},
];

let logs={},notes={},custom=[],selColor=PALETTE[0],selEmoji="📌";
let syllabus=[],sylDone={},sylNotes={},openSylId=null,selSylColor=PALETTE[0],selSylEmoji="📖";
try{logs=JSON.parse(localStorage.getItem("sos_logs")||"{}");}catch{}
try{notes=JSON.parse(localStorage.getItem("sos_notes")||"{}");}catch{}
try{custom=JSON.parse(localStorage.getItem("sos_custom")||"[]");}catch{}
try{syllabus=JSON.parse(localStorage.getItem("sos_syllabus")||"null")||JSON.parse(JSON.stringify(SYLLABUS_DEFAULT));}catch{syllabus=JSON.parse(JSON.stringify(SYLLABUS_DEFAULT));}
try{sylDone=JSON.parse(localStorage.getItem("sos_syldone")||"{}");}catch{}
try{sylNotes=JSON.parse(localStorage.getItem("sos_sylnotes")||"{}");}catch{}

function save(){
  try{localStorage.setItem("sos_logs",JSON.stringify(logs));}catch{}
  try{localStorage.setItem("sos_notes",JSON.stringify(notes));}catch{}
  try{localStorage.setItem("sos_custom",JSON.stringify(custom));}catch{}
  try{localStorage.setItem("sos_syllabus",JSON.stringify(syllabus));}catch{}
  try{localStorage.setItem("sos_syldone",JSON.stringify(sylDone));}catch{}
  try{localStorage.setItem("sos_sylnotes",JSON.stringify(sylNotes));}catch{}
}

function allBlocks(){return[...FIXED,...custom];}
function allSubjects(){return allBlocks().flatMap(b=>b.subjects);}

// ── UTILS ─────────────────────────────────────────────
const tk=()=>new Date().toISOString().split("T")[0];
function wd(){
  const b=new Date(),d=b.getDay(),m=new Date(b);
  m.setDate(b.getDate()-(d===0?6:d-1));
  return Array.from({length:7},(_,i)=>{const x=new Date(m);x.setDate(m.getDate()+i);return x.toISOString().split("T")[0];});
}
function h2r(h,a){const r=parseInt(h.slice(1,3),16),g=parseInt(h.slice(3,5),16),b=parseInt(h.slice(5,7),16);return`rgba(${r},${g},${b},${a})`;}
function ab(){
  const h=new Date().getHours();
  if(h>=9&&h<13)return"b1";if(h>=13&&h<14)return"b2";
  if(h>=14&&h<15)return"b3";if(h>=15&&h<16)return"b4";
  if(h>=16&&h<17)return"b5";if(h>=19)return"b6";return null;
}
function motive(p){
  if(p===0)return"ਚੱਲੋ ਸ਼ੁਰੂ ਕਰੋ — Let's begin, Lakhwinder 💪";
  if(p<25)return"Started! Keep that engine running 🔥";
  if(p<50)return"Good progress. Don't slow down 📈";
  if(p<75)return"Over halfway — brilliant work ⚡";
  if(p<100)return"Almost there. Strong finish ahead 🏁";
  return"ਸ਼ਾਬਾਸ਼! All subjects done! 🏆";
}
function fmtDate(){return new Date().toLocaleDateString("en-IN",{weekday:"long",day:"numeric",month:"long",year:"numeric"});}
function streak(){
  let s=0,d=new Date();
  for(;;){const k=d.toISOString().split("T")[0];if(Object.values(logs[k]||{}).some(Boolean)){s++;d.setDate(d.getDate()-1);}else break;}
  return s;
}

// ── HEADER ────────────────────────────────────────────
function updateHeader(){
  const tl=logs[tk()]||{},AS=allSubjects(),tot=AS.length;
  const done=AS.filter(s=>tl[s.id]).length,pct=tot?Math.round(done/tot*100):0;
  document.getElementById("arcFill").style.strokeDashoffset=131.9-(131.9*pct/100);
  document.getElementById("arcPct").textContent=pct+"%";
  document.getElementById("streakVal").textContent=streak();
  document.getElementById("progFill").style.width=pct+"%";
  document.getElementById("progFill").style.background=pct===100?"linear-gradient(90deg,#34d399,#2dd4bf)":"linear-gradient(90deg,#6366f1,#2dd4bf)";
  document.getElementById("progNums").textContent=done+"/"+tot;
  document.getElementById("motiveEl").textContent=motive(pct);
}

// ── TODAY ─────────────────────────────────────────────
function renderToday(){
  const today=tk(),tl=logs[today]||{},abl=ab();
  const AS=allSubjects(),tot=AS.length;
  const done=AS.filter(s=>tl[s.id]).length,pct=tot?Math.round(done/tot*100):0;
  let h=`<div class="date-chip">📅 ${fmtDate()}</div>`;

  allBlocks().forEach((block,bi)=>{
    const isNow=block.id===abl,isC=!FIXED.find(b=>b.id===block.id);
    const bd=block.subjects.filter(s=>tl[s.id]).length,bt=block.subjects.length;
    const bp=bt?Math.round(bd/bt*100):0,cols=bt<=1?"1fr":"1fr 1fr";
    h+=`<div class="block${isNow?" now":""}${isC?" custom-block":""}" style="animation-delay:${bi*0.04}s${isC?`;border-color:${h2r(block.color,0.3)}`:""}">
      <div class="block-head">
        <div class="block-head-left">
          <div class="block-dot" style="background:${block.color};box-shadow:0 0 8px ${h2r(block.color,0.5)}"></div>
          <div>
            <div class="block-title" style="color:${isNow?block.color:"var(--text)"}">
              ${block.label}
              ${isNow?'<span class="now-tag">LIVE</span>':""}
              ${isC?'<span class="custom-tag">CUSTOM</span>':""}
            </div>
            <div class="block-time">${block.time||"—"}</div>
          </div>
        </div>
        <div class="block-head-right">
          <div class="bprog-txt" style="color:${bd===bt&&bt>0?"var(--emerald)":"var(--text3)"}">${bd}/${bt}</div>
          <div class="bprog-bar"><div class="bprog-fill" style="width:${bp}%;background:${block.color}"></div></div>
          ${isC?`<button class="icon-btn" onclick="delSlot('${block.id}')">🗑</button>`:""}
        </div>
      </div>
      <div class="subjects" style="grid-template-columns:${cols}">`;
    block.subjects.forEach(sub=>{
      const d=tl[sub.id];
      h+=`<div class="subj${d?" done":""}" onclick="toggle('${sub.id}')"
        style="background:${d?h2r(block.color,0.1):"rgba(255,255,255,0.02)"};border-color:${d?h2r(block.color,0.3):"var(--border)"}">
        <div class="subj-emoji">${sub.icon}</div>
        <div class="subj-text">
          <span class="subj-name" style="color:${d?block.color:"var(--text2)"}">${sub.name}</span>
          <span class="subj-tag" style="color:${d?h2r(block.color,0.7):"var(--text3)"}">${d?"✓ complete":"pending"}</span>
        </div>
        <div class="subj-check" style="background:${d?block.color:"transparent"};border-color:${d?block.color:"rgba(255,255,255,0.12)"}">
          ${d?'<span style="color:#000;font-weight:800">✓</span>':""}
        </div>
        <button class="subj-del" onclick="delSubj(event,'${block.id}','${sub.id}')">×</button>
      </div>`;
    });
    h+=`</div>
      <div class="add-row">
        <input class="add-inp" id="si-${block.id}" placeholder="＋ Add subject…" onkeydown="if(event.key==='Enter')addSubj('${block.id}')"/>
        <button class="add-btn" onclick="addSubj('${block.id}')">Add</button>
      </div></div>`;
  });

  h+=`<button class="add-slot-btn" onclick="openModal()">＋ &nbsp;Add Custom Slot</button>`;
  if(pct===100&&tot>0) h+=`<div class="complete" style="margin-top:12px">
    <div class="complete-icon">🏆</div>
    <div class="complete-title">ਸ਼ਾਬਾਸ਼ LAKHWINDER!</div>
    <div class="complete-sub">All ${tot} subjects completed!<br>Constable bann ke rahoge 💪</div>
  </div>`;
  document.getElementById("tab-today").innerHTML=h;
}

function toggle(sid){
  const t=tk();if(!logs[t])logs[t]={};
  logs[t][sid]=!logs[t][sid];save();updateHeader();renderToday();
}
function addSubj(bid){
  const inp=document.getElementById("si-"+bid);if(!inp||!inp.value.trim())return;
  const block=allBlocks().find(b=>b.id===bid);if(!block)return;
  const fallback=["📌","⭐","📖","✏️","🔖","💡","🎯","📝","🧪","🔑"];
  block.subjects.push({id:"s_"+Date.now(),name:inp.value.trim(),icon:fallback[block.subjects.length%fallback.length]});
  const ci=custom.findIndex(b=>b.id===bid);if(ci>=0)custom[ci]=block;
  save();updateHeader();renderToday();
}
function delSubj(e,bid,sid){
  e.stopPropagation();
  const block=allBlocks().find(b=>b.id===bid);if(!block)return;
  block.subjects=block.subjects.filter(s=>s.id!==sid);
  const ci=custom.findIndex(b=>b.id===bid);if(ci>=0)custom[ci]=block;
  save();updateHeader();renderToday();
}
function delSlot(bid){
  if(!confirm("Delete this custom slot?"))return;
  custom=custom.filter(b=>b.id!==bid);save();updateHeader();renderToday();
}

// ── MODAL ─────────────────────────────────────────────
function buildModal(){
  document.getElementById("colorGrid").innerHTML=PALETTE.map(c=>`<div class="cswatch${c===selColor?" sel":""}" style="background:${c}" onclick="pickColor('${c}')"></div>`).join("");
  document.getElementById("emojiGrid").innerHTML=EMOJIS.map(e=>`<div class="epick${e===selEmoji?" sel":""}" onclick="pickEmoji('${e}')">${e}</div>`).join("");
}
function pickColor(c){selColor=c;buildModal();}
function pickEmoji(e){selEmoji=e;document.getElementById("emojiBtn").textContent=e;buildModal();}
function toggleEmoji(){const g=document.getElementById("emojiGrid");g.style.display=g.style.display==="none"?"flex":"none";}
function openModal(){
  selColor=PALETTE[custom.length%PALETTE.length];
  selEmoji=EMOJIS[custom.length%EMOJIS.length];
  ["mName","mFrom","mTo","mSubj"].forEach(id=>document.getElementById(id).value="");
  document.getElementById("emojiBtn").textContent=selEmoji;
  document.getElementById("emojiGrid").style.display="none";
  buildModal();document.getElementById("overlay").classList.add("open");
}
function closeModal(){document.getElementById("overlay").classList.remove("open");}
function saveSlot(){
  const name=document.getElementById("mName").value.trim();if(!name){document.getElementById("mName").focus();return;}
  const from=document.getElementById("mFrom").value.trim(),to=document.getElementById("mTo").value.trim();
  const sname=document.getElementById("mSubj").value.trim();
  const time=from&&to?`${from} – ${to}`:from||to||"";
  const slot={id:"cs_"+Date.now(),label:name,time,color:selColor,custom:true,
    subjects:sname?[{id:"s_"+Date.now(),name:sname,icon:selEmoji}]:[]};
  custom.push(slot);save();closeModal();updateHeader();renderToday();
}

// ── WEEK ──────────────────────────────────────────────
function renderWeek(){
  const today=tk(),wds=wd(),AS=allSubjects(),tot=AS.length;
  const wdone=wds.reduce((a,d)=>a+Object.values(logs[d]||{}).filter(Boolean).length,0);
  let h=`<div class="week-hdr"><div class="week-title">WEEKLY OVERVIEW</div><div class="week-stat">${wdone}/${tot*7}</div></div><div class="day-cols">`;
  wds.forEach((date,di)=>{
    const cnt=Object.values(logs[date]||{}).filter(Boolean).length;
    const p=tot?Math.round(cnt/tot*100):0,isT=date===today;
    const bc=p===100?"#34d399":p>60?"#e8b84b":p>0?"#6366f1":"transparent";
    h+=`<div class="day-col">
      <div class="day-name" style="color:${isT?"var(--teal)":"var(--text3)"}">${DAYS[di]}</div>
      <div class="day-bar-bg" style="border-color:${isT?"rgba(45,212,191,0.3)":"var(--border)"}">
        <div class="day-bar-fill" style="height:${p}%;background:${bc}"></div>
      </div>
      <div class="day-pct">${p}%</div>
    </div>`;
  });
  h+=`</div>`;
  allBlocks().forEach(block=>{
    if(!block.subjects.length)return;
    h+=`<div class="wgs"><div class="wgs-title">
      <span style="display:inline-block;width:7px;height:7px;border-radius:50%;background:${block.color};box-shadow:0 0 5px ${h2r(block.color,0.5)}"></span>
      <span style="color:${block.color}">${block.label}</span>
      <span style="color:var(--text3);font-weight:400;font-size:8px">${block.time}</span>
    </div>`;
    block.subjects.forEach(sub=>{
      const cells=wds.map(d=>!!(logs[d]?.[sub.id])),wc=cells.filter(Boolean).length;
      h+=`<div class="wgs-row"><span class="wgs-icon">${sub.icon}</span><span class="wgs-name">${sub.name}</span><div class="wgs-cells">`;
      cells.forEach((done,di)=>{h+=`<div class="wgs-cell" style="background:${done?block.color:"rgba(255,255,255,0.04)"};border:${wds[di]===today?`1px solid ${h2r(block.color,0.5)}`:"none"}"></div>`;});
      h+=`</div><span class="wgs-n" style="color:${block.color}">${wc}/7</span></div>`;
    });
    h+=`</div>`;
  });
  document.getElementById("tab-week").innerHTML=h;
}

// ── NOTES ─────────────────────────────────────────────
function renderNotes(){
  const today=tk(),tn=notes[today]||[];
  let h=`<div class="notes-label">📅 ${today} · ${tn.length} note${tn.length!==1?"s":""}</div>
  <div class="notes-row">
    <input class="notes-inp" id="noteInp" placeholder="Add a doubt, reminder, key point…" onkeydown="if(event.key==='Enter')addNote()"/>
    <button class="notes-add" onclick="addNote()">+</button>
  </div>`;
  if(!tn.length){h+=`<div class="notes-empty"><div class="empty-icon">📝</div>No notes yet.<br>Capture doubts & key points here.</div>`;}
  else tn.forEach((n,i)=>{h+=`<div class="note-card"><div class="note-text">${n}</div><button class="note-del" onclick="delNote(${i})">×</button></div>`;});
  document.getElementById("tab-notes").innerHTML=h;
}
function addNote(){const el=document.getElementById("noteInp");if(!el||!el.value.trim())return;const t=tk();if(!notes[t])notes[t]=[];notes[t].push(el.value.trim());save();renderNotes();}
function delNote(i){const t=tk();notes[t].splice(i,1);save();renderNotes();}

// ── SYLLABUS ──────────────────────────────────────────
function renderSyllabus(){
  const el=document.getElementById("tab-syllabus");
  if(openSylId){
    renderSubjectDetail(openSylId);return;
  }
  let h=`<button class="syl-add-btn" onclick="openSylModal()">＋ Add New Subject</button>
  <div class="syl-grid">`;
  syllabus.forEach(sub=>{
    const total=sub.chapters.length;
    const done=sub.chapters.filter(c=>sylDone[c.id]).length;
    const pct=total?Math.round(done/total*100):0;
    h+=`<div class="syl-folder" onclick="openSubject('${sub.id}')" style="border-top:3px solid ${sub.color}">
      <div class="syl-folder-top">
        <div>
          <div class="syl-folder-icon">${sub.icon}</div>
          <div class="syl-folder-name">${sub.name}</div>
          <div class="syl-folder-count">${done}/${total} chapters · ${pct}%</div>
        </div>
        <button class="syl-folder-del" onclick="event.stopPropagation();delSubject('${sub.id}')">🗑</button>
      </div>
      <div class="syl-prog-bar"><div class="syl-prog-fill" style="width:${pct}%;background:${sub.color}"></div></div>
    </div>`;
  });
  h+=`</div>`;
  el.innerHTML=h;
}

function openSubject(id){openSylId=id;renderSubjectDetail(id);}

function renderSubjectDetail(id){
  const sub=syllabus.find(s=>s.id===id);if(!sub)return;
  const done=sub.chapters.filter(c=>sylDone[c.id]).length;
  const el=document.getElementById("tab-syllabus");
  let h=`<div class="syl-back" onclick="openSylId=null;renderSyllabus()">
    <span class="syl-back-icon">←</span> Back to Subjects
  </div>
  <div class="syl-subject-hdr" style="background:${sub.color}22;border:1px solid ${sub.color}44">
    <span style="font-size:28px">${sub.icon}</span>
    <div>
      <div class="syl-subject-title">${sub.name}</div>
      <div class="syl-subject-sub">${done}/${sub.chapters.length} completed</div>
    </div>
  </div>`;

  sub.chapters.forEach(ch=>{
    const isDone=!!sylDone[ch.id];
    const note=sylNotes[ch.id]||"";
    h+=`<div class="syl-chapter${isDone?" done":""}" id="ch_${ch.id}">
      <div class="syl-check${isDone?" checked":""}" onclick="toggleChapter('${sub.id}','${ch.id}')">
        ${isDone?'<span style="color:#000;font-weight:800;font-size:12px">✓</span>':""}
      </div>
      <div class="syl-chapter-body">
        <div class="syl-chapter-name">${ch.name}</div>
        ${note?`<div class="syl-chapter-note">📝 ${note}</div>`:""}
        <input class="syl-note-inp" id="ni_${ch.id}" placeholder="Add note…" value="${note}"
          onblur="saveChapterNote('${ch.id}',this.value)" onkeydown="if(event.key==='Enter')saveChapterNote('${ch.id}',this.value)"/>
      </div>
      <div class="syl-chapter-actions">
        <button class="syl-note-btn" onclick="toggleNoteInp('${ch.id}')">📝</button>
        <button class="syl-del-btn" onclick="delChapter('${sub.id}','${ch.id}')">×</button>
      </div>
    </div>`;
  });

  h+=`<div class="syl-add-ch">
    <input id="newChInp_${id}" placeholder="＋ New chapter name…" onkeydown="if(event.key==='Enter')addChapter('${id}')"/>
    <button onclick="addChapter('${id}')">Add</button>
  </div>`;
  el.innerHTML=h;
}

function toggleChapter(subId,chId){
  sylDone[chId]=!sylDone[chId];save();renderSubjectDetail(subId);
}
function toggleNoteInp(chId){
  const inp=document.getElementById("ni_"+chId);
  if(inp){inp.style.display=inp.style.display==="none"?"block":"none";if(inp.style.display==="block")inp.focus();}
}
function saveChapterNote(chId,val){
  sylNotes[chId]=val.trim();save();
  if(openSylId)renderSubjectDetail(openSylId);
}
function addChapter(subId){
  const inp=document.getElementById("newChInp_"+subId);if(!inp||!inp.value.trim())return;
  const sub=syllabus.find(s=>s.id===subId);if(!sub)return;
  sub.chapters.push({id:"ch_"+Date.now(),name:inp.value.trim()});
  save();renderSubjectDetail(subId);
}
function delChapter(subId,chId){
  const sub=syllabus.find(s=>s.id===subId);if(!sub)return;
  if(!confirm("Delete this chapter?"))return;
  sub.chapters=sub.chapters.filter(c=>c.id!==chId);
  delete sylDone[chId];delete sylNotes[chId];
  save();renderSubjectDetail(subId);
}
function delSubject(id){
  if(!confirm("Delete this subject and all its chapters?"))return;
  syllabus=syllabus.filter(s=>s.id!==id);
  if(openSylId===id)openSylId=null;
  save();renderSyllabus();
}

// ── SYLLABUS MODAL ────────────────────────────────────
function openSylModal(){
  selSylColor=PALETTE[syllabus.length%PALETTE.length];
  selSylEmoji="📖";
  document.getElementById("sylName").value="";
  document.getElementById("sylEmojiBtn").textContent=selSylEmoji;
  document.getElementById("sylEmojiGrid").style.display="none";
  document.getElementById("sylColorGrid").innerHTML=PALETTE.map(c=>`<div class="cswatch${c===selSylColor?" sel":""}" style="background:${c}" onclick="pickSylColor('${c}')"></div>`).join("");
  document.getElementById("sylEmojiGrid").innerHTML=EMOJIS.map(e=>`<div class="epick${e===selSylEmoji?" sel":""}" onclick="pickSylEmoji('${e}')">${e}</div>`).join("");
  document.getElementById("sylModal").classList.add("open");
}
function closeSylModal(){document.getElementById("sylModal").classList.remove("open");}
function pickSylColor(c){selSylColor=c;document.getElementById("sylColorGrid").innerHTML=PALETTE.map(x=>`<div class="cswatch${x===c?" sel":""}" style="background:${x}" onclick="pickSylColor('${x}')"></div>`).join("");}
function pickSylEmoji(e){selSylEmoji=e;document.getElementById("sylEmojiBtn").textContent=e;document.getElementById("sylEmojiGrid").innerHTML=EMOJIS.map(x=>`<div class="epick${x===e?" sel":""}" onclick="pickSylEmoji('${x}')">${x}</div>`).join("");}
function toggleSylEmoji(){const g=document.getElementById("sylEmojiGrid");g.style.display=g.style.display==="none"?"flex":"none";}
function saveNewSubject(){
  const name=document.getElementById("sylName").value.trim();if(!name){document.getElementById("sylName").focus();return;}
  syllabus.push({id:"syl_"+Date.now(),name,icon:selSylEmoji,color:selSylColor,chapters:[]});
  save();closeSylModal();renderSyllabus();
}

// ── STATS ─────────────────────────────────────────────
function renderStats(){
  const today=tk(),tl=logs[today]||{},wds=wd(),AS=allSubjects(),tot=AS.length;
  const todayDone=AS.filter(s=>tl[s.id]).length,todayPct=tot?Math.round(todayDone/tot*100):0;
  const weekDone=wds.reduce((a,d)=>a+Object.values(logs[d]||{}).filter(Boolean).length,0);
  const weekPct=(tot*7)?Math.round(weekDone/(tot*7)*100):0;
  const totalSylChapters=syllabus.reduce((a,s)=>a+s.chapters.length,0);
  const doneSylChapters=syllabus.reduce((a,s)=>a+s.chapters.filter(c=>sylDone[c.id]).length,0);
  const sylPct=totalSylChapters?Math.round(doneSylChapters/totalSylChapters*100):0;

  let h=``;

  // ── Summary Cards ──
  h+=`<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:18px;">
    <div style="background:var(--surface2);border:1px solid var(--border);border-radius:var(--r2);padding:12px;text-align:center">
      <div style="font-size:22px;font-weight:800;color:var(--teal);font-family:'JetBrains Mono',monospace">${todayPct}%</div>
      <div style="font-size:8px;color:var(--text3);text-transform:uppercase;letter-spacing:1px;margin-top:3px">Today</div>
    </div>
    <div style="background:var(--surface2);border:1px solid var(--border);border-radius:var(--r2);padding:12px;text-align:center">
      <div style="font-size:22px;font-weight:800;color:var(--indigo);font-family:'JetBrains Mono',monospace">${weekPct}%</div>
      <div style="font-size:8px;color:var(--text3);text-transform:uppercase;letter-spacing:1px;margin-top:3px">This Week</div>
    </div>
    <div style="background:var(--surface2);border:1px solid var(--border);border-radius:var(--r2);padding:12px;text-align:center">
      <div style="font-size:22px;font-weight:800;color:var(--gold);font-family:'JetBrains Mono',monospace">${streak()}🔥</div>
      <div style="font-size:8px;color:var(--text3);text-transform:uppercase;letter-spacing:1px;margin-top:3px">Streak</div>
    </div>
    <div style="background:var(--surface2);border:1px solid var(--border);border-radius:var(--r2);padding:12px;text-align:center">
      <div style="font-size:22px;font-weight:800;color:var(--emerald);font-family:'JetBrains Mono',monospace">${sylPct}%</div>
      <div style="font-size:8px;color:var(--text3);text-transform:uppercase;letter-spacing:1px;margin-top:3px">Syllabus Done</div>
    </div>
  </div>`;

  // ── Weekly Bar Graph ──
  h+=`<div style="margin-bottom:22px">
    <div style="font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--text3);padding:7px 0;margin-bottom:12px;border-bottom:1px solid var(--border)">📅 WEEKLY PROGRESS</div>
    <div style="display:flex;align-items:flex-end;gap:5px;height:110px;margin-bottom:6px;">`;
  wds.forEach((date,di)=>{
    const cnt=Object.values(logs[date]||{}).filter(Boolean).length;
    const p=tot?Math.round(cnt/tot*100):0,isT=date===today;
    const col=p===100?"#34d399":p>60?"#e8b84b":isT?"#6366f1":"#2dd4bf";
    h+=`<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;">
      <div style="font-size:7px;color:${col};font-family:'JetBrains Mono',monospace;">${p}%</div>
      <div style="width:100%;height:${Math.max(p,3)}%;background:${col};border-radius:4px 4px 0 0;opacity:${isT?1:0.65};min-height:3px;transition:height 0.5s;"></div>
      <div style="font-size:8px;color:${isT?"var(--teal)":"var(--text3)"};font-family:'JetBrains Mono',monospace;">${DAYS[di]}</div>
    </div>`;
  });
  h+=`</div></div>`;

  // ── Today Block-wise Bars ──
  h+=`<div style="margin-bottom:22px">
    <div style="font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--text3);padding:7px 0;margin-bottom:10px;border-bottom:1px solid var(--border)">📋 TODAY — BLOCK PROGRESS</div>
    <div style="display:flex;flex-direction:column;gap:8px;">`;
  allBlocks().forEach(block=>{
    if(!block.subjects.length)return;
    const bd=block.subjects.filter(s=>tl[s.id]).length,bt=block.subjects.length;
    const bp=bt?Math.round(bd/bt*100):0;
    h+=`<div style="display:flex;align-items:center;gap:8px;">
      <div style="font-size:9px;color:var(--text2);width:95px;flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-family:'JetBrains Mono',monospace;">${block.label}</div>
      <div style="flex:1;height:18px;background:rgba(255,255,255,0.04);border-radius:4px;overflow:hidden;">
        <div style="height:100%;width:${bp}%;background:${block.color};border-radius:4px;display:flex;align-items:center;justify-content:flex-end;padding-right:5px;transition:width 0.5s;">
          ${bp>15?`<span style="font-size:8px;font-weight:800;color:#000;">${bp}%</span>`:""}
        </div>
      </div>
      <div style="font-size:9px;color:${block.color};width:30px;text-align:right;font-family:'JetBrains Mono',monospace;">${bd}/${bt}</div>
    </div>`;
  });
  h+=`</div></div>`;

  // ── Syllabus Subject-wise Bars ──
  h+=`<div style="margin-bottom:22px">
    <div style="font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--text3);padding:7px 0;margin-bottom:10px;border-bottom:1px solid var(--border)">📚 SYLLABUS PROGRESS</div>
    <div style="display:flex;flex-direction:column;gap:8px;">`;
  syllabus.forEach(sub=>{
    const total=sub.chapters.length;if(!total)return;
    const done=sub.chapters.filter(c=>sylDone[c.id]).length;
    const pct=Math.round(done/total*100);
    h+=`<div style="display:flex;align-items:center;gap:8px;">
      <div style="font-size:9px;color:var(--text2);width:95px;flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-family:'JetBrains Mono',monospace;">${sub.icon} ${sub.name}</div>
      <div style="flex:1;height:18px;background:rgba(255,255,255,0.04);border-radius:4px;overflow:hidden;">
        <div style="height:100%;width:${pct}%;background:${sub.color};border-radius:4px;display:flex;align-items:center;justify-content:flex-end;padding-right:5px;transition:width 0.5s;">
          ${pct>15?`<span style="font-size:8px;font-weight:800;color:#000;">${pct}%</span>`:""}
        </div>
      </div>
      <div style="font-size:9px;color:${sub.color};width:30px;text-align:right;font-family:'JetBrains Mono',monospace;">${done}/${total}</div>
    </div>`;
  });
  h+=`</div></div>`;

  document.getElementById("tab-stats").innerHTML=h;
}

// ── TABS ──────────────────────────────────────────────
let curTab="today";
function switchTab(tab){
  curTab=tab;
  const tabs=["today","week","syllabus","stats","notes"];
  document.querySelectorAll(".tab").forEach((b,i)=>b.classList.toggle("active",tabs[i]===tab));
  document.querySelectorAll(".bnav-btn").forEach((b,i)=>b.classList.toggle("active",tabs[i]===tab));
  tabs.forEach(t=>document.getElementById("tab-"+t).style.display=t===tab?"block":"none");
  if(tab==="week")renderWeek();
  if(tab==="notes")renderNotes();
  if(tab==="syllabus")renderSyllabus();
  if(tab==="stats")renderStats();
}

// ── SERVICE WORKER ────────────────────────────────────
if("serviceWorker" in navigator){
  navigator.serviceWorker.register("./sw.js").catch(()=>{});
}

// ── iOS INSTALL HINT ──────────────────────────────────
const isIOS=/iphone|ipad|ipod/i.test(navigator.userAgent);
const isStandalone=window.navigator.standalone===true;
const hintDismissed=localStorage.getItem("hint_dismissed");
if(isIOS&&!isStandalone&&!hintDismissed){
  setTimeout(()=>{
    const hint=document.getElementById("installHint");
    hint.classList.add("show");
    hint.querySelector(".install-close").addEventListener("click",()=>{
      hint.style.display="none";
      localStorage.setItem("hint_dismissed","1");
    });
  },3000);
}

// ── PWA INSTALL (Android/Chrome) ─────────────────────
let deferredPrompt=null;
window.addEventListener("beforeinstallprompt",e=>{
  e.preventDefault();deferredPrompt=e;
  const hint=document.getElementById("installHint");
  hint.querySelector("strong").textContent="Install App";
  hint.querySelector("span").textContent="Tap here to install StudyOS on your phone";
  hint.classList.add("show");
  hint.querySelector(".install-close").addEventListener("click",()=>{hint.style.display="none";});
  hint.addEventListener("click",()=>{
    if(deferredPrompt){deferredPrompt.prompt();deferredPrompt=null;hint.style.display="none";}
  });
});

// ── DAILY RESET ───────────────────────────────────────
function checkDailyReset(){
  const lastDate=localStorage.getItem("sos_last_date"),today=tk();
  if(lastDate&&lastDate!==today){logs[today]={};save();}
  localStorage.setItem("sos_last_date",today);
}
checkDailyReset();

// ── INIT ──────────────────────────────────────────────
updateHeader();renderToday();
setInterval(()=>{checkDailyReset();updateHeader();if(curTab==="today")renderToday();},60000);
</script>
